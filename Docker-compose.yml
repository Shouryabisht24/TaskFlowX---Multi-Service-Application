services:
  db:
    image: postgres:16
    container_name: postgres-db
    environment:
       POSTGRES_USER: postgres
       POSTGRES_PASSWORD: mysecurepassword123
       POSTGRES_DB: taskflowxdb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - Taskflowx
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "taskflowxdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8080:8080"
    networks:
      - Taskflowx
    environment:
       SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/taskflowxdb
       AUTH_SECRET_KEY: c7b1e2f3a4b5c6d7e8f9g0h1i2j3k4l5m6n7o8p9q0r1s2t3u4v5w6x7y8z9
       ALGORITHM: HS256
    depends_on:
      - db

  task-service:
    build: ./task-service
    container_name: task-service
    ports:
      - "8081:8081"
    networks:
      - Taskflowx
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/taskflowxdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: mysecurepassword123
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    environment:
      - VITE_AUTH_SERVICE_URL=http://localhost:8080
      - VITE_TASK_SERVICE_URL=http://localhost:8081
    networks:
      - Taskflowx
    depends_on:
      - auth-service
      - task-service

volumes:
  db_data:

networks:
  Taskflowx:
    driver: bridge