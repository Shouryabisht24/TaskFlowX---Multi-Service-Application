apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taskflowx-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: taskflowx-project
  source: 
    repoURL: https://github.com/Shouryabisht24/TaskFlowX---Multi-Service-Application
    targetRevision: main
    path: k8s-specifications

  destination:
    server: https://kubernetes.default.svc
    namespace: taskflowx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true 
