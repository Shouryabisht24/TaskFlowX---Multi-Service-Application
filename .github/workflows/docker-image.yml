name: Docker Image CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'ArgoCD/**'
      - 'k8s-specifications/**'
      - 'kind-cluster/**'
      - 'monitoring/**'
      - '**/*.md'
      - '**/*.sh'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./auth-service
          push: ${{ vars.DEPLOY_ENABLED == 'true' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/auth-service:latest', secrets.DOCKERHUB_USERNAME) || 'auth-service:latest' }}
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/auth-service:{1}', secrets.DOCKERHUB_USERNAME, github.sha) || format('auth-service:{0}', github.sha) }}

       - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./task-service
          push: ${{ vars.DEPLOY_ENABLED == 'true' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/task-service:latest', secrets.DOCKERHUB_USERNAME) || 'task-service:latest' }}
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/task-service:{1}', secrets.DOCKERHUB_USERNAME, github.sha) || format('task-service:{0}', github.sha) }}

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: ${{ vars.DEPLOY_ENABLED == 'true' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/frontend:latest', secrets.DOCKERHUB_USERNAME) || 'frontend:latest' }}
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/frontend:{1}', secrets.DOCKERHUB_USERNAME, github.sha) || format('frontend:{0}', github.sha) }}
