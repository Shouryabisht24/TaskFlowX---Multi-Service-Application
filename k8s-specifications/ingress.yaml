apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskflowx-ingress
  namespace: Taskflowx
  annotations:
    # Use Nginx as the controller
    kubernetes.io/ingress.class: "nginx"
    # This solves CORS issues by routing everything through one domain
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
spec:
  rules:
  - http:
      paths:
      # 1. Route all traffic starting with /auth to the Python service
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 8000
      # 2. Route all traffic starting with /api to the Java service
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: task-service
            port:
              number: 8081
      # 3. Everything else goes to the React Frontend
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
