apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: shourya24/frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: VITE_AUTH_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: frontend-secrets
                  key: AUTH_SERVICE_URL
            - name: VITE_TASK_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: frontend-secrets
                  key: TASK_SERVICE_URL
